<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>坦隆环境 Logo Preview</title>
  <style>
    :root {
      --ink: #102E35;
      --deep: #0B2F38;
      --teal: #0FA7A1;
      --fog: #EAF7F5;
      --line: rgba(16, 46, 53, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f7fbfa 0%, #e9f4f2 100%);
    }
    main {
      width: min(1480px, calc(100vw - 96px));
      margin: 0 auto;
      padding: 72px 0 84px;
    }
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 40px;
      align-items: end;
      margin-bottom: 42px;
    }
    h1 {
      margin: 0;
      font-size: 52px;
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
    }
    .meta {
      color: #6a8187;
      font-size: 15px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: right;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 28px;
      margin-bottom: 28px;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 24px 80px rgba(11,47,56,0.10);
      overflow: hidden;
    }
    .hero .panel:first-child {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 360px;
      background: radial-gradient(circle at 18% 20%, rgba(139,231,194,0.22), transparent 34%), #092c35;
    }
    .hero .panel:first-child img { width: min(520px, 80%); }
    .hero .panel:last-child {
      padding: 46px;
      display: grid;
      align-content: center;
      gap: 26px;
    }
    .hero .panel:last-child img { width: 340px; max-width: 100%; }
    .principles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 8px;
    }
    .principles span {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      color: #526b70;
      line-height: 1.6;
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
    }
    .card-media {
      background: #fff;
      padding: 0;
    }
    .card-media img {
      width: 100%;
      display: block;
    }
    .card-copy {
      display: flex;
      justify-content: space-between;
      gap: 28px;
      padding: 18px 22px;
      border-top: 1px solid var(--line);
      color: #526b70;
      font-size: 15px;
    }
    .card-copy strong {
      color: var(--ink);
      font-size: 16px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .sizes {
      margin-top: 28px;
      padding: 28px;
      display: flex;
      gap: 32px;
      align-items: end;
      flex-wrap: wrap;
    }
    .sizes img { display: block; }
    .sizes .chip {
      display: grid;
      justify-items: center;
      gap: 8px;
      color: #6a8187;
      font-size: 12px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>坦隆环境 Logo 方向</h1>
      <div class="meta">Logo refresh / 2026-07-03</div>
    </header>
    <section class="hero">
      <div class="panel"><img src="final/tanlong-logo-full.svg" alt="坦隆环境推荐横版 logo"></div>
      <div class="panel">
        <img src="final/tanlong-logo-full-dark.svg" alt="坦隆环境深色文字版 logo">
        <div class="principles">
          <span>减少装饰，保留水环境与工程交付的核心语义。</span>
          <span>标识在官网首屏、favicon 和工程物料上都能成立。</span>
          <span>颜色从亮蓝转为深水蓝、清透青绿和留白。</span>
        </div>
      </div>
    </section>
    <section class="grid">
      <article class="card">
      <div class="card-media"><img src="logos/concepts/concept-1-water-gate.svg" alt="01 Water Gate"></div>
      <div class="card-copy">
        <strong>01 Water Gate</strong>
        <span>推荐用于官网。轮廓最稳，导航栏识别度最高。</span>
      </div>
    </article>
<article class="card">
      <div class="card-media"><img src="logos/concepts/concept-2-contour-rise.svg" alt="02 Contour Rise"></div>
      <div class="card-copy">
        <strong>02 Contour Rise</strong>
        <span>备选方向，用于比较气质和使用场景。</span>
      </div>
    </article>
<article class="card">
      <div class="card-media"><img src="logos/concepts/concept-3-engineering-axis.svg" alt="03 Engineering Axis"></div>
      <div class="card-copy">
        <strong>03 Engineering Axis</strong>
        <span>备选方向，用于比较气质和使用场景。</span>
      </div>
    </article>
<article class="card">
      <div class="card-media"><img src="logos/concepts/concept-4-institutional-seal.svg" alt="04 Institutional Seal"></div>
      <div class="card-copy">
        <strong>04 Institutional Seal</strong>
        <span>备选方向，用于比较气质和使用场景。</span>
      </div>
    </article>
    </section>
    <section class="panel sizes">
      <div class="chip"><img src="final/tanlong-logo-mark.svg" width="96" height="96" alt="96px mark"><span>96px</span></div>
      <div class="chip"><img src="final/tanlong-logo-mark.svg" width="64" height="64" alt="64px mark"><span>64px</span></div>
      <div class="chip"><img src="final/tanlong-logo-mark.svg" width="32" height="32" alt="32px mark"><span>32px</span></div>
      <div class="chip"><img src="final/tanlong-logo-mark.svg" width="16" height="16" alt="16px mark"><span>16px</span></div>
    </section>
  </main>
</body>
</html>
