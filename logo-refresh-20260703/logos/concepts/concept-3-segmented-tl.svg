      <polygon points="82,382 166,382 206,430 119,430" fill="#FFFFFF"/>
      <polygon points="204,382 386,382 426,430 164,430" fill="#FFFFFF"/>
      <polygon points="386,382 426,430 462,382 424,334" fill="#21C7D8"/>
