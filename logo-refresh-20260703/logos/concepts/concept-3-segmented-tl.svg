      <stop offset="0" stop-color="#F8FCFB"/>
      <stop offset="1" stop-color="#E6F4F1"/>
    </linearGradient>
    <filter id="concept-3-segmented-tl-soft" x="-12%" y="-16%" width="124%" height="132%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#082E35" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1024" height="512" rx="38" fill="url(#concept-3-segmented-tl-bg)"/>
