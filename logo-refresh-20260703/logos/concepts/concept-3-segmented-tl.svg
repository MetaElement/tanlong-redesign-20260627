    <text x="510" y="184" fill="#0D2D33" font-size="58" font-weight="760">坦隆环境</text>
    <text x="514" y="233" fill="#6D858B" font-size="22" font-weight="700" letter-spacing="4.4">TANLONG ENVIRONMENT</text>
