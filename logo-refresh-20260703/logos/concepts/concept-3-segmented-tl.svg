<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512" role="img" aria-labelledby="concept-3-segmented-tl-title concept-3-segmented-tl-desc">
  <title id="concept-3-segmented-tl-title">Segmented TL</title>
  <desc id="concept-3-segmented-tl-desc">更接近参考图左侧的断裂块面，识别度强，但整体气质更锋利。</desc>
